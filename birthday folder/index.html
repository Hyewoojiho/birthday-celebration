<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to the Party! 🐾</title>
    <link rel="stylesheet" href="style.css">
    <style>

        body {
            /* Use the local filename you just saved */
            background-image: url('cts.gif');

            /* This makes it repeat like wallpaper */
            background-repeat: repeat;
            background-size: 150px;
            /* Adjust this to make the kittens smaller or larger */

            /* This adds the dark tint like in your screenshot */
            background-color: rgba(0, 0, 0, 0.7);
            background-blend-mode: darken;

            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .home-card {
            background: rgba(30, 30, 30, 0.85);
            /* Dark transparent box */
            padding: 50px;
            border-radius: 40px;
            border: 4px solid #ff85a1;
            /* Pink glowing border */
            box-shadow: 0 0 40px rgba(255, 133, 161, 0.4);
            text-align: center;
            max-width: 550px;
            width: 90%;
            backdrop-filter: blur(10px);
            /* Makes the glass look frosted */
        }

        h1 {
            color: white;
            font-size: 3.5rem;
            margin-bottom: 30px;
            text-shadow: 0 0 15px #ff85a1;
        }

        .nav-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            background-color: #ff85a1;
            color: white;
            padding: 18px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            background-color: #ff5c8a;
            transform: scale(1.05);
        }

        h1 {
            color: white;
            font-size: 3.5rem;
            margin-bottom: 40px;
            text-shadow: 0 0 10px #ff85a1;
            /* Pink glow on text */
        }

        .nav-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            background-color: #ff85a1;
            /* Pink buttons like your screenshot */
            color: white;
            padding: 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            background-color: #ff5c8a;
            transform: scale(1.05);
            box-shadow: 0 0 15px #ff85a1;
        }

        .nav-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 30px;
        }

        .btn {
            text-decoration: none;
            display: inline-block;
            background-color: var(--berry);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.1) rotate(-2deg);
            background-color: var(--lavender);
            color: #444;
        }
    </style>
</head>

<body>

    <div class="home-card">
        <h1>Welcome Birthday Girl! 🎈</h1>
        <p>Pick a destination to start the fun:</p>

        <div class="nav-buttons">


            <a href="magzine.html" class="btn">📖 Read the Magazine</a>

            <a href="wish.html" class="btn">🎂 Make a Wish!</a>
        </div>
    </div>

</body>

</html>
